<meta charset="UTF-8">

<style>
  :root{
    --bg1:#0b1f4d;--bg2:#123a8c;--card:#173f99;--card2:#0e2c75;
    --accent:#00c2ff;--accent2:#3b8bff;--green:#19e08a;--green-dark:#0fb56f;
    --text:#f4f8ff;--text-dim:#aecbff;--plate:#1f4fae;--plate-soft:#2c5fc7;
    --glow:0 0 18px rgba(0,194,255,.45);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Segoe UI','Sarabun',Tahoma,sans-serif;
    background:
      radial-gradient(circle at 15% 0%,rgba(0,194,255,.25),transparent 45%),
      radial-gradient(circle at 100% 100%,rgba(59,139,255,.25),transparent 45%),
      linear-gradient(160deg,var(--bg1),var(--bg2));
    color:var(--text);display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:20px;
  }
  .slide{
    width:920px;max-width:96vw;aspect-ratio:16/9;
    background:linear-gradient(165deg,var(--card),var(--card2));
    border-radius:28px;
    box-shadow:0 24px 70px rgba(0,0,0,.45),inset 0 0 0 1px rgba(255,255,255,.08),var(--glow);
    padding:14px 34px;position:relative;overflow:hidden;display:flex;flex-direction:column;
  }
  .slide::before{
    content:'';position:absolute;top:-80px;right:-80px;width:220px;height:220px;
    background:radial-gradient(circle,rgba(0,194,255,.3),transparent 70%);pointer-events:none;
  }
  .top-bar{display:flex;justify-content:space-between;align-items:flex-start;z-index:1;position:relative;}
  .game-title{font-size:20px;font-weight:800;letter-spacing:.5px;}
  .mode-row{display:flex;gap:8px;margin-top:5px;}
  .mode-btn{
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
    color:var(--text-dim);font-size:11px;font-weight:700;padding:5px 12px;
    border-radius:10px;cursor:pointer;transition:.2s;
  }
  .mode-btn:hover{background:rgba(255,255,255,.14);}
  .mode-btn.active{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#06204f;border-color:transparent;box-shadow:0 4px 12px rgba(0,194,255,.4);
  }
  .timer-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .timer{
    width:54px;height:54px;border-radius:50%;background:#0a1c4d;
    display:flex;align-items:center;justify-content:center;
    font-size:17px;font-weight:800;color:var(--accent);
    box-shadow:0 0 0 3px rgba(0,194,255,.35),0 0 14px rgba(0,194,255,.3);
  }
  .timer.low{color:#ff5c7a;box-shadow:0 0 0 3px rgba(255,92,122,.35),0 0 14px rgba(255,92,122,.3);}
  .pause-btn{
    width:34px;height:24px;border-radius:8px;background:rgba(255,255,255,.12);
    border:none;color:var(--text);font-size:13px;letter-spacing:2px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
  }
  .pause-btn:hover{background:rgba(255,255,255,.22);}
  .body-row{flex:1;display:flex;gap:28px;margin-top:10px;z-index:1;position:relative;}
  .left-col{
    flex:1.1;background:linear-gradient(160deg,var(--plate-soft),var(--plate));
    border-radius:20px;padding:18px 16px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.1),0 8px 20px rgba(0,0,0,.2);
  }
  .emoji-row{font-size:54px;letter-spacing:14px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.3));}
  .hint-row{display:flex;align-items:center;gap:16px;margin-top:20px;}
  .hint-slot{
    width:78px;height:58px;border-radius:14px;background:var(--card2);
    display:flex;align-items:center;justify-content:center;font-size:28px;
    position:relative;box-shadow:inset 0 0 0 1px rgba(255,255,255,.1);
    transition:.4s;overflow:hidden;
  }
  .hint-slot .ghost-letter{position:absolute;font-size:24px;font-weight:800;color:rgba(255,255,255,.18);}
  .hint-slot .emoji-content{opacity:0;transform:scale(.5);transition:.4s;}
  .hint-slot.revealed{
    background:linear-gradient(160deg,var(--plate-soft),var(--plate));
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.18),0 0 14px rgba(0,194,255,.25);
  }
  .hint-slot.revealed .ghost-letter{opacity:0;}
  .hint-slot.revealed .emoji-content{opacity:1;transform:scale(1);}
  .hint-btn{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border:none;color:#06204f;font-size:13px;font-weight:800;
    padding:11px 16px;border-radius:14px;cursor:pointer;
    box-shadow:0 6px 16px rgba(0,194,255,.45);white-space:nowrap;transition:.2s;
  }
  .hint-btn:disabled{opacity:.4;cursor:default;box-shadow:none;}
  .hint-btn:not(:disabled):hover{transform:translateY(-1px) scale(1.03);}
  .right-col{flex:1;display:flex;flex-direction:column;justify-content:center;gap:14px;}
  .name-plate{
    background:linear-gradient(160deg,var(--plate-soft),var(--plate));
    border-radius:18px;padding:20px 18px;text-align:center;cursor:pointer;
    position:relative;overflow:hidden;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.1);transition:.3s;
    /* กำหนดความสูงขั้นต่ำไว้ กล่องไม่ยุบ */
    min-height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  }
  .name-plate:hover{box-shadow:inset 0 0 0 1px rgba(255,255,255,.2),0 0 16px rgba(0,194,255,.3);}
  .name-plate .ghost{font-size:12px;letter-spacing:3px;color:rgba(255,255,255,.25);text-transform:uppercase;font-weight:700;}
  .name-plate .thai-name{font-size:24px;font-weight:800;margin-top:5px;opacity:0;transition:opacity .3s;visibility:hidden;}
  .name-plate .eng-name{font-size:13px;color:var(--text-dim);margin-top:4px;opacity:0;transition:opacity .3s;visibility:hidden;}
  .name-plate.revealed{box-shadow:inset 0 0 0 1px rgba(255,255,255,.2),0 0 20px rgba(0,194,255,.35);}
  .name-plate.revealed .ghost{opacity:0;visibility:hidden;}
  .name-plate.revealed .thai-name,.name-plate.revealed .eng-name{opacity:1;visibility:visible;}
  .name-plate .tap-hint{font-size:10px;color:var(--text-dim);margin-top:10px;opacity:.7;}
  .name-plate.revealed .tap-hint{display:none;}
  .actors-block{text-align:center;min-height:36px;}
  .actors-label{font-size:10px;color:var(--text-dim);letter-spacing:1px;opacity:.6;font-weight:700;margin-bottom:4px;}
  .actors{
    font-size:13px;color:var(--text-dim);line-height:1.5;padding:0 6px;
    filter:blur(5px);opacity:.5;transition:filter .4s,opacity .4s;
    user-select:none;min-height:20px;
  }
  .actors.revealed{filter:blur(0);opacity:1;user-select:text;}
  .bottom-bar{display:flex;justify-content:space-between;align-items:center;margin-top:10px;z-index:1;position:relative;}
  .progress-counter{font-size:15px;font-weight:700;color:var(--text-dim);display:flex;align-items:baseline;gap:2px;}
  .progress-counter .cur{font-size:26px;font-weight:800;color:var(--accent);text-shadow:0 0 12px rgba(0,194,255,.55);transition:all .2s;}
  .progress-counter .sep{font-size:18px;opacity:.35;margin:0 3px;}
  .progress-counter .total{opacity:.4;}
  .next-btn{
    width:54px;height:54px;border-radius:16px;
    background:linear-gradient(135deg,var(--green),var(--green-dark));
    border:none;display:flex;align-items:center;justify-content:center;
    cursor:pointer;box-shadow:0 8px 18px rgba(25,224,138,.45);transition:.2s;
  }
  .next-btn:hover{transform:translateX(3px) scale(1.05);}
  .next-btn svg{width:24px;height:24px;}
  @media(max-width:720px){.slide{aspect-ratio:auto;padding:18px;}.body-row{flex-direction:column;}}
</style>

  actors:"ฟลุ๊ค, นีโอ, เลโก้, สุดยอด"
},
{
  main:["⛺️","🤌🏼","🌬️"],
  hidden:["🫸🏼","🕺🏻"],
  thai:"MUTELUV:แม่ไม้มวยรำ",
  eng:"Fist Foot Fusion",
  actors:"สกาย, พรีม, มาร์ค, พิพลอย"
}
  ];

  
let order=[],orderPos=0,current=0,selectedTime=60,timeLeft=60;
let timerInterval=null,paused=false,hintStage=0,nameRevealed=false,globalCount=1;

const mainEmojiEl=document.getElementById('mainEmoji');
const emojiAEl=document.getElementById('emojiA');
const emojiBEl=document.getElementById('emojiB');
const slotA=document.getElementById('slotA');
const slotB=document.getElementById('slotB');
const hintBtn=document.getElementById('hintBtn');
const namePlate=document.getElementById('namePlate');
const thaiNameEl=document.getElementById('thaiName');
const engNameEl=document.getElementById('engName');
const actorsEl=document.getElementById('actors');
const timerEl=document.getElementById('timer');
const pauseBtn=document.getElementById('pauseBtn');
const nextBtn=document.getElementById('nextBtn');
const slideEl=document.getElementById('slide');
const modeRow=document.getElementById('modeRow');
const modeBtns=modeRow.querySelectorAll('.mode-btn');
const curNumEl=document.getElementById('curNum');
const totalNumEl=document.getElementById('totalNum');

function setActiveModeBtn(){ modeBtns.forEach(b=>b.classList.toggle('active',Number(b.dataset.time)===selectedTime)); }
modeBtns.forEach(btn=>btn.addEventListener('click',()=>{ selectedTime=Number(btn.dataset.time); setActiveModeBtn(); resetTimer(); }));
modeBtns[0].classList.add('active');

function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } return a; }
function buildOrder(){ order=shuffle(seriesData.map((_,i)=>i)); orderPos=0; current=order[0]; }
function updateCounter(){ curNumEl.textContent=globalCount; totalNumEl.textContent=seriesData.length; }

function loadRound(){
  const item=seriesData[current];

  // emoji อัปเดตทันที ไม่ delay
  mainEmojiEl.textContent=item.main.join(' ');
  emojiAEl.textContent=item.hidden[0];
  emojiBEl.textContent=item.hidden[1];

  // ปิดป้ายก่อน แล้วค่อยใส่ชื่อใหม่หลัง transition (300ms)
  slotA.classList.remove('revealed');
  slotB.classList.remove('revealed');
  namePlate.classList.remove('revealed');
  actorsEl.classList.remove('revealed');
  hintStage=0; nameRevealed=false;
  hintBtn.disabled=false; hintBtn.textContent='💡 ใบ้';

  setTimeout(()=>{
    thaiNameEl.textContent=item.thai;
    engNameEl.textContent=item.eng;
    actorsEl.textContent=item.actors;
  },300);

  updateCounter();
  resetTimer();
}

function resetTimer(){ clearInterval(timerInterval); timeLeft=selectedTime; paused=false; pauseBtn.textContent='❚❚'; updateTimerDisplay(); startTimer(); }
function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(paused) return;
    timeLeft--;
    if(timeLeft<=0){
      timeLeft=0; updateTimerDisplay(); clearInterval(timerInterval);
      slotA.classList.add('revealed'); slotB.classList.add('revealed');
      namePlate.classList.add('revealed'); actorsEl.classList.add('revealed');
      hintBtn.disabled=true; return;
    }
    updateTimerDisplay();
  },1000);
}
function updateTimerDisplay(){ timerEl.textContent=timeLeft; timerEl.classList.toggle('low',timeLeft<=10); }

pauseBtn.addEventListener('click',()=>{ paused=!paused; pauseBtn.textContent=paused?'►':'❚❚'; });

hintBtn.addEventListener('click',()=>{
  if(hintStage===0){ slotA.classList.add('revealed'); hintStage=1; hintBtn.textContent='💡 ใบ้ (B)'; }
  else if(hintStage===1){ slotB.classList.add('revealed'); hintStage=2; hintBtn.disabled=true; hintBtn.textContent='💡 ใบ้หมดแล้ว'; }
});

namePlate.addEventListener('click',()=>{
  nameRevealed=!nameRevealed;
  namePlate.classList.toggle('revealed',nameRevealed);
  actorsEl.classList.toggle('revealed',nameRevealed);
});

function goNext(){
  orderPos=(orderPos+1)%order.length;
  if(orderPos===0){ buildOrder(); globalCount=1; }
  else { current=order[orderPos]; globalCount++; }
  loadRound();
}
function goPrev(){
  if(globalCount>1) globalCount--;
  orderPos=(orderPos-1+order.length)%order.length;
  current=order[orderPos]; loadRound();
}

nextBtn.addEventListener('click',goNext);
let touchStartX=0;
slideEl.addEventListener('touchstart',e=>{touchStartX=e.changedTouches[0].screenX;});
slideEl.addEventListener('touchend',e=>{ const diff=e.changedTouches[0].screenX-touchStartX; if(Math.abs(diff)>50){if(diff<0)goNext();else goPrev();} });
document.addEventListener('keydown',e=>{ if(e.key==='ArrowRight')goNext(); else if(e.key==='ArrowLeft')goPrev(); });

buildOrder();
loadRound();
</script>
</body>
</html>
